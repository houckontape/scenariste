<aside class="flex flex-col h-full bg-cinema-dark text-cinema-light w-64 border-r border-cinema-deep">
  <!-- Profile Section -->
  <div class="p-6 flex flex-col items-center border-b border-cinema-deep-50">
    <div class="relative mb-4">
      @if (currentUser()?.avatar_url) {
        <img [src]="currentUser()?.avatar_url" alt="Avatar" class="w-20 h-20 rounded-full border-2 border-cinema-accent object-cover shadow-lg">
      } @else {
        <div class="w-20 h-20 rounded-full border-2 border-cinema-accent bg-cinema-deep flex items-center justify-center shadow-lg text-cinema-accent">
          <i class="fa-solid fa-pen-fancy text-3xl"></i>
        </div>
      }
      <div class="absolute bottom-0 right-0 w-5 h-5 bg-green-500 border-2 border-cinema-dark rounded-full"></div>
    </div>
    <h3 class="user-name">{{ userDisplayName }}</h3>
    <span class="user-role">{{ userRoleDisplay }}</span>
  </div>

  <!-- Navigation Section -->
  <nav class="flex-grow py-6 overflow-y-auto">
    <ul class="space-y-1 px-3">
      <li>
        <a routerLink="/dashboard/workspace" routerLinkActive="active" class="nav-link">
          <i class="fa-solid fa-rocket w-6"></i>
          <span>Espace de travail</span>
        </a>
      </li>
      <li>
        <a routerLink="/dashboard/projects" routerLinkActive="active" class="nav-link">
          <i class="fa-solid fa-folder w-6"></i>
          <span>Mes Projets</span>
        </a>
      </li>

      @if (currentProjectId()) {
        <li class="separator-li">
          <div class="separator-line"></div>
          <span class="text-[10px] uppercase font-bold text-cinema-accent px-4 py-2 block">Projet Actuel</span>
        </li>
        <li>
          <a [routerLink]="['/dashboard/projects', currentProjectId(), 'notes']" routerLinkActive="active" class="nav-link">
            <i class="fa-solid fa-pen-to-square w-6 text-blue-400"></i>
            <span>Notes & Brainstorming</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/dashboard/projects', currentProjectId(), 'characters']" routerLinkActive="active" class="nav-link">
            <i class="fa-solid fa-users-rectangle w-6 text-indigo-400"></i>
            <span>Bible Personnages</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/dashboard/projects', currentProjectId(), 'structure']" routerLinkActive="active" class="nav-link">
            <i class="fa-solid fa-layer-group w-6 text-amber-400"></i>
            <span>Structure (Actes)</span>
          </a>
        </li>
      }

      <li class="separator-li">
        <div class="separator-line"></div>
      </li>
      <li>
        <a routerLink="/dashboard/profile" routerLinkActive="active" class="nav-link">
          <i class="fa-solid fa-user-gear w-6"></i>
          <span>Configuration</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Logout Section -->
  <div class="p-4 border-t border-cinema-deep-50">
    <button (click)="logout()" class="logout-btn">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Déconnexion</span>
    </button>
  </div>
</aside>
