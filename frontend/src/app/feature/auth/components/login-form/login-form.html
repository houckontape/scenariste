<div class="login-container">
    <h2>Connexion à Scenariste</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input id="email" type="email" formControlName="email" placeholder="nom@exemple.com">
            @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
                <span class="error-msg">Email invalide</span>
            }
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" formControlName="password" placeholder="••••••••">
            @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
                <span class="error-msg">Mot de passe requis</span>
            }
        </div>

        <button type="submit" [disabled]="loginForm.invalid">Se connecter</button>
    </form>
</div>
