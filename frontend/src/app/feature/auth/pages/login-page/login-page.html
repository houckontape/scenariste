<app-top-bar></app-top-bar>

<div class="login-container relative overflow-hidden flex items-center justify-center">

  <!-- Login Card -->
  <main class="login-card rounded-3xl shadow-2xl backdrop-blur-md">
    <!-- Close Button -->
    <div class="close-btn" routerLink="/">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 1L1 13M1 1L13 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Login</h1>

    @if (authStore.error(); as errorMsg) {
      <div class="alert alert-error">
        ⚠️ {{ errorMsg }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()">
      <!-- Email Input -->
      <div class="form-group">
        <input type="email" placeholder="Email" formControlName="email">
        <div class="icon">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L9 7L17 1M1 13H17V1H1V13Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <input type="password" placeholder="Password" formControlName="password">
        <div class="icon">
          <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="7" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M4 7V4C4 1.79086 5.79086 0 8 0V0C10.2091 0 12 1.79086 12 4V7" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <!-- Options -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" formControlName="rememberMe">
          <span>Remember me</span>
        </label>
        <a routerLink="/auth/forgot-password" class="forgot-pwd">Forgot Password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || authStore.isLoading()">
        {{ authStore.isLoading() ? 'Connecting...' : 'Login' }}
      </button>

      <!-- Footer -->
      <p class="form-footer">
        Don't have an account? <a routerLink="/auth/register">Register</a>
      </p>
    </form>
  </main>
</div>
