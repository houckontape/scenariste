version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rustover_db
    environment:
      POSTGRES_USER: rustover_user
      POSTGRES_PASSWORD: rustover_password
      POSTGRES_DB: rustover_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: